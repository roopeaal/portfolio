<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200">
  <defs>
    <radialGradient id="centerGlow" cx="50%" cy="38%" r="66%">
      <stop offset="0%" stop-color="#3a4b69" stop-opacity="0.44" />
      <stop offset="60%" stop-color="#2a3954" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#202d44" stop-opacity="0" />
    </radialGradient>

    <radialGradient id="edgeShade" cx="50%" cy="50%" r="74%">
      <stop offset="65%" stop-color="#0f1a2c" stop-opacity="0" />
      <stop offset="100%" stop-color="#0d1727" stop-opacity="0.4" />
    </radialGradient>

    <filter id="paperNoise" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.78" numOctaves="2" seed="11" stitchTiles="stitch" />
      <feColorMatrix type="saturate" values="0" />
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.18" />
      </feComponentTransfer>
    </filter>
  </defs>

  <rect width="1600" height="1200" fill="#202d44" />
  <rect width="1600" height="1200" fill="url(#centerGlow)" />
  <rect width="1600" height="1200" filter="url(#paperNoise)" opacity="0.55" />
  <rect width="1600" height="1200" fill="url(#edgeShade)" />

  <line x1="0" y1="150" x2="1600" y2="150" stroke="#9fb2cf" stroke-opacity="0.16" stroke-width="1.2" />
  <g transform="translate(800 150)" fill="none" stroke="#9fb2cf" stroke-opacity="0.3" stroke-width="1.5" stroke-linecap="round">
    <path d="M-65 0 C-40 -5 -26 -5 -12 0 C-4 3 4 3 12 0 C26 -5 40 -5 65 0" />
    <path d="M-24 0 C-14 -9 -5 -9 0 0 C5 -9 14 -9 24 0" />
  </g>
</svg>
